<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 로그인 화면 -->
    <div class="auth-container" id="auth-container">
        <div class="auth-box">
            <h1>Todo</h1>
            <p class="auth-subtitle">로그인하여 할 일을 관리하세요</p>
            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="login">로그인</button>
                <button class="auth-tab" data-tab="signup">회원가입</button>
            </div>
            <form id="auth-form">
                <input type="email" id="auth-email" placeholder="이메일" required>
                <input type="password" id="auth-password" placeholder="비밀번호" required>
                <button type="submit" id="auth-submit-btn">로그인</button>
            </form>
            <div class="auth-divider"><span>또는</span></div>
            <div class="social-buttons">
                <button class="social-btn google-btn" id="google-login-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                    Google로 로그인
                </button>
                <button class="social-btn github-btn" id="github-login-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
                    GitHub로 로그인
                </button>
            </div>
            <p class="auth-error hidden" id="auth-error"></p>
        </div>
    </div>

    <div class="app hidden" id="app">
        <header class="header">
            <div class="header-top">
                <h1>Todo</h1>
                <div class="header-right">
                    <span class="date" id="today-date"></span>
                    <button class="logout-btn" id="logout-btn">로그아웃</button>
                </div>
            </div>
            <div class="stats" id="stats">
                <div class="stat-bar">
                    <div class="stat-fill" id="stat-fill"></div>
                </div>
                <span class="stat-text" id="stat-text">0 / 0 완료</span>
            </div>
        </header>

        <form class="add-form" id="todo-form">
            <div class="add-row">
                <input type="text" id="todo-input" placeholder="새로운 할 일..." autocomplete="off">
                <button type="submit" id="add-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                </button>
            </div>
            <div class="add-options">
                <select id="priority-select">
                    <option value="high">🔴 높음</option>
                    <option value="medium" selected>🟡 중간</option>
                    <option value="low">🟢 낮음</option>
                </select>
                <input type="date" id="due-date-input">
            </div>
        </form>

        <nav class="filter-tabs" id="filter-tabs">
            <button class="filter-btn active" data-filter="all">전체</button>
            <button class="filter-btn" data-filter="active">진행중</button>
            <button class="filter-btn" data-filter="completed">완료</button>
        </nav>

        <ul class="todo-list" id="todo-list"></ul>
        <div class="empty" id="empty-msg">
            <p>할 일이 없습니다</p>
            <span>위에서 새로운 할 일을 추가해보세요</span>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
